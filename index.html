<!doctype html>
<html>
  <head>
    <title>BuddyQuest</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>BuddyQuest</h1>

    <!-- Time picker: only visible in "idle" state -->
    <!-- (Might need to upgrade later) -->
    <div id="timePicker">
      <select id="hourSelect"></select>
      :
      <select id="minuteSelect"></select>
    </div>

    <h2 id="timer">25:00</h2>
    <div id="mascot">🧊</div>

    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="cancelBtn" class="hidden">Cancel</button>

    <!-- Supportive message shown when timer finishes -->
    <p id="message" class="hidden"></p>

    <script src="script.js"></script>
  </body>
</html>
