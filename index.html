<!doctype html>
<html>
  <head>
    <title>BuddyQuest</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>BuddyQuest</h1>

    <!-- Time picker: only visible in "idle" state -->
    <div id="timePicker">
      <div class="wheel-wrap">
        <div class="wheel-highlight"></div>
        <div class="wheel-picker" id="hourWheel"></div>
        <span class="wheel-colon">:</span>
        <div class="wheel-picker" id="minuteWheel"></div>
      </div>
    </div>

    <h2 id="timer">25:00</h2>
    <div id="mascot">🧊</div>

    <button id="startBtn">Start</button>
    <button id="pauseBtn" class="hidden">Pause</button>
    <button id="cancelBtn" class="hidden">Cancel</button>

    <!-- Supportive message shown when timer finishes -->
    <p id="message" class="hidden"></p>

    <script src="script.js"></script>
  </body>
</html>
